<!DOCTYPE html>
<html>
<head>

    <title>Add Project</title>

    <style>

        body{
            font-family:Arial;
            background:#f1f5f9;
            padding:50px;
        }

        .box{
            background:white;
            width:500px;
            padding:40px;
            margin:auto;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Add New Project 🚀</h2>

        <form method="POST">

            <input
                type="text"
                name="project_name"
                placeholder="Enter Project Name"
            >

            <button type="submit">
                Generate Key
            </button>

        </form>

    </div>

</body>
</html>
